<!-- CONTENU -->
<div class="container">

    <h2 class="fw-bold mb-3 text-primary">📄 Clôturer une formation</h2>

    <div class="card shadow p-4">

        <form onsubmit="event.preventDefault(); cloturerFormation();">

            <div class="mb-3">
                <label class="form-label">ID Inscription :</label>
                <input type="number" id="idInscription" class="form-control" placeholder="ex: 1" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Appréciation :</label>
                <input type="text" id="appreciation" class="form-control" placeholder="Très bien" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Document (nom du fichier) :</label>
                <input type="text" id="document" class="form-control" placeholder="attestation.pdf" required>
            </div>

            <button type="submit" class="btn btn-success w-100">
                ✅ Clôturer la formation
            </button>

        </form>

    </div>

</div>
