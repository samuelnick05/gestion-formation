<div class="container">

    <h2 class="fw-bold mb-3">📝 Soumettre une demande de formation</h2>

    <div class="card shadow p-4">

        <form onsubmit="event.preventDefault(); submitDemande();">

            <div class="mb-3">
                <label class="form-label">ID Employé :</label>
                <input type="number" id="employe" class="form-control"
                       placeholder="ex: 1" required>
            </div>

            <div class="mb-3">
                <label class="form-label">ID Formation :</label>
                <input type="number" id="formation" class="form-control"
                       placeholder="ex: 1" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Date de demande :</label>
                <input type="text" id="date" class="form-control"
                       placeholder="2026-05-12" required>
            </div>
