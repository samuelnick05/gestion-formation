    <!-- API + JS FORMATIONS -->

    <script src="../assets/js/formations.js"></script>

    <!-- TON CSS -->
    <link rel="stylesheet" href="../assets/css/style.css">
</head>

<body onload="loadFormationForEdit()" class="bg-light">

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <a class="navbar-brand" href="../index.html">Gestion Formation</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">

        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="list.html">Formations</a></li>

<!-- CONTENU -->
<div class="container">

    <h2 class="fw-bold mb-3">✏ Modifier une formation</h2>

    <div class="card shadow p-4">

        <form onsubmit="event.preventDefault(); updateFormation();">

            <div class="mb-3">
                <label class="form-label">Numéro :</label>
                <input type="number" id="num" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Nom :</label>
                <input type="text" id="nom" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Contenu :</label>
                <textarea id="contenu" class="form-control" rows="3" required></textarea>
            </div>

            <button type="submit" class="btn btn-warning w-100 mt-3">
                 Mettre à jour la formation
            </button>

        </form>

    </div>

</div>

</body>
